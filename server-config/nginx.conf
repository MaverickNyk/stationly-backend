# =========================================================================================
# STATIONLY UNIFIED ARCHITECTURE - NGINX CONFIGURATION
# =========================================================================================
# This configuration manages traffic for the api.stationly.co.uk domain.
# It acts as a reverse proxy splitting traffic between the two backend services:
# 
# 1. NODE.JS BACKEND (API Gateway): Runs on port 3000. 
#    - Handles all public API requests (/api/v1/*) from mobile/web apps.
#    - Serves API documentation (/docs, /openapi.json).
#    - Serves static assets (/icons/).
#
# 2. JAVA SYNCER (Background Worker): Runs on port 8080.
#    - Has NO public API endpoints.
#    - Only exposed endpoint is the restricted /admin/ route to manually trigger sync jobs.
#    - We explicitly block traffic to old deprecated Java routes (StationlyBE, StationlySyncer).
# =========================================================================================

upstream java_syncer {
    # The legacy Java Spring Boot application purely for DB synchronization
    server 127.0.0.1:8080;
}

upstream node_backend {
    # The modern Express.js API gateway serving the SDUI and real-time frontend logic
    server 127.0.0.1:3000;
}

server {
    listen 80;
    server_name api.stationly.co.uk;

    # Force HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    server_name api.stationly.co.uk;
    listen 443 ssl; # managed by Certbot

    # Redirect root to new Node.js Scalar Auth Docs
    # Using 302 (Found) instead of 301 (Permanent) to prevent browser caching of old redirects.
    location = / {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        return 302 https://api.stationly.co.uk/docs;
    }

    # =========================================================================================
    #  JAVA SYNCER (BACKGROUND WORKER ROUTING)
    # =========================================================================================
    
    # [ROUTE]: https://api.stationly.co.uk/StationlySyncer/api/v1/admin/*
    # [DESTINATION]: Java Spring Boot application (127.0.0.1:8080)
    # [PURPOSE]: The Java backend has been stripped of all user-facing APIs. 
    # This route strictly allows administrators to manually trigger data sync processes.
    location /StationlySyncer/api/v1/admin/ {
        proxy_pass http://java_syncer;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # =========================================================================================
    #  SECURITY RULES (BLOCKING DEPRECATED ROUTES)
    # =========================================================================================
    
    # [ROUTE]: https://api.stationly.co.uk/StationlyBE/docs
    # [DESTINATION]: New Documentation (api.stationly.co.uk/docs)
    location /StationlyBE/docs {
        return 301 https://api.stationly.co.uk/docs;
    }

    location /StationlyBE/ {
        return 403;
    }

    # [ROUTE]: https://api.stationly.co.uk/StationlySyncer/docs
    location /StationlySyncer/docs {
        return 301 https://api.stationly.co.uk/docs;
    }

    location /StationlySyncer/ {
        return 403;
    }

    # =========================================================================================
    #  NODE.JS API GATEWAY (REAL-TIME DATA & SDUI)
    # =========================================================================================

    # [ROUTE]: https://api.stationly.co.uk/api/v1/*
    # [DESTINATION]: Express.js Node Application (127.0.0.1:3000)
    # [PURPOSE]: This is the shiny new API Gateway! Mobile apps request this path directly.
    # It serves SDUI layouts, fetches users from Firebase, and proxies missing TfL data.
    location /api/v1/ {
        proxy_pass http://node_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # [ROUTE]: https://api.stationly.co.uk/docs
    # [DESTINATION]: Express.js Node Application (127.0.0.1:3000)
    # [PURPOSE]: Intercepts the documentation url and forwards it to Node to serve the Scalar UI.
    location /docs {
        proxy_pass http://node_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # [ROUTE]: https://api.stationly.co.uk/openapi.json
    # [DESTINATION]: Express.js Node Application (127.0.0.1:3000)
    # [PURPOSE]: Required endpoint for the Scalar UI and external clients to download the Swagger spec.
    location /openapi.json {
        proxy_pass http://node_backend;
        proxy_set_header Host $host;
    }

    # [ROUTE]: https://api.stationly.co.uk/icons/*
    # [DESTINATION]: Express.js Node Application (127.0.0.1:3000)
    # [PURPOSE]: Serves static image assets (like the tube and bus icons) to the SDUI mobile clients.
    location /icons/ {
        proxy_pass http://node_backend;
        proxy_set_header Host $host;
    }

    # Let's Encrypt SSL Configs
    ssl_certificate /etc/letsencrypt/live/api.stationly.co.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.stationly.co.uk/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}
