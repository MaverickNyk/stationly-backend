# Stationly Admin Console — staging reverse proxy
# Install on the server as /etc/nginx/sites-available/staging-admin.stationly.co.uk
# then: sudo ln -s ../sites-available/staging-admin.stationly.co.uk /etc/nginx/sites-enabled/
#       sudo certbot --nginx -d staging-admin.stationly.co.uk
#       sudo nginx -t && sudo systemctl reload nginx
#
# The Next.js console runs under pm2 on 127.0.0.1:4000 (see staging_deploy.sh).

upstream stationly_admin {
    server 127.0.0.1:4000;
}

server {
    listen 80;
    server_name staging-admin.stationly.co.uk;
    location / { return 301 https://$host$request_uri; }
}

server {
    server_name staging-admin.stationly.co.uk;
    listen 443 ssl; # managed by Certbot

    # Keep it out of search indexes (defence in depth on top of access control).
    add_header X-Robots-Tag "noindex, nofollow" always;

    location / {
        proxy_pass http://stationly_admin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
