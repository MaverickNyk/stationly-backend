name: Deploy to Production

on:
  push:
    branches: [release_prod]

jobs:
  enforce-source-branch:
    name: Verify merge came from release_staging
    runs-on: ubuntu-latest
    steps:
      - name: Check source branch
        run: |
          COMMIT_MSG=$(echo "${{ github.event.head_commit.message }}")
          echo "Commit: $COMMIT_MSG"
          if echo "$COMMIT_MSG" | grep -qE "Merge.*release_staging|from release_staging"; then
            echo "✅ Source branch verified: release_staging"
          else
            echo "⚠️  Warning: could not verify source was release_staging"
            echo "Commit message: $COMMIT_MSG"
            # Not blocking here — branch protection rules enforce this at the PR level
          fi

  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: enforce-source-branch
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js 18
        uses: actions/setup-node@v5
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Assemble production .env
        env:
          APP_ENV: production
          APP_BASE_URL: https://api.stationly.co.uk
          APP_WEB_URL: https://stationly.co.uk
          TFL_APP_KEY: ${{ secrets.TFL_APP_KEY }}
          FIRESTORE_PROJECT_ID: ${{ secrets.FIRESTORE_PROJECT_ID }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          STATIONLY_ADMIN_KEY: ${{ secrets.STATIONLY_ADMIN_KEY }}
        run: |
          cp .env.defaults .env.prod
          while IFS='=' read -r key value || [[ -n "$key" ]]; do
              [[ -z "$key" || "$key" =~ ^# ]] && continue
              clean_key=$(echo "$key" | cut -d'=' -f1 | xargs)
              
              # Resolve the environment variable dynamically by its name
              resolved_value="${!clean_key}"
              
              if [ -n "$resolved_value" ]; then
                  echo "  Writing $clean_key from env block"
                  if grep -q "^${clean_key}=" .env.prod; then
                      sed -i "s|^${clean_key}=.*|${clean_key}=${resolved_value}|g" .env.prod
                  else
                      echo "${clean_key}=${resolved_value}" >> .env.prod
                  fi
              else
                  echo "  ⚠️ Warning: $clean_key is empty or not provided"
              fi
          done < .env.remote

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PROD_SSH_KEY }}" > ~/.ssh/prod.key
          chmod 600 ~/.ssh/prod.key
          ssh-keyscan -H ${{ secrets.PROD_HOST }} >> ~/.ssh/known_hosts

      - name: Sync built files to server
        run: |
          rsync -az --delete -e "ssh -i ~/.ssh/prod.key" \
            --exclude node_modules \
            --exclude .git \
            --exclude src \
            --exclude .env \
            --exclude serviceAccountKey.json \
            --exclude .DS_Store \
            --exclude .claude \
            --exclude .cursor \
            --exclude .gemini \
            --exclude graphify-out \
            --exclude '*.md' \
            --exclude '*.sqlite' \
            --exclude .github \
            ./ ubuntu@${{ secrets.PROD_HOST }}:~/stationly-backend/

      - name: Upload .env and secure configuration
        run: |
          # Upload env to application directory
          scp -i ~/.ssh/prod.key .env.prod ubuntu@${{ secrets.PROD_HOST }}:~/stationly-backend/.env
          
          # Enforce strict file permissions on the server
          ssh -i ~/.ssh/prod.key ubuntu@${{ secrets.PROD_HOST }} "
            chmod 600 ~/stationly-backend/.env
          "

      - name: Install deps & reload
        run: |
          ssh -i ~/.ssh/prod.key ubuntu@${{ secrets.PROD_HOST }} "
            cd ~/stationly-backend
            npm ci --omit=dev --silent
            pm2 install pm2-logrotate
            pm2 set pm2-logrotate:max_size 20M
            pm2 set pm2-logrotate:retain 7
            pm2 set pm2-logrotate:compress true
            pm2 reload stationly-backend --update-env || pm2 start dist/server.js --name stationly-backend -i max
            pm2 save
          "

      - name: Health check
        run: |
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 \
            "https://api.stationly.co.uk/api/v1/modes" \
            -H "X-Stationly-Key: health-check" 2>/dev/null || echo "000")
          if [[ "$STATUS" == "401" || "$STATUS" == "403" || "$STATUS" == "200" ]]; then
            echo "✅ Production deployment complete — server responding (HTTP $STATUS)"
          else
            echo "❌ Health check failed — unexpected HTTP $STATUS"
            exit 1
          fi
